entries:
  - id: ll-018
    date: "2026-05-08"
    task: "创建 FGameSaveManager"
    category: build
    lesson: >
      在模块 Private/ 子目录中创建新类文件时，模块主头文件（如 Test.h）的包含路径
      可能不可达（取决于模块的 IncludePaths 配置），导致 #include "Test.h" 失败。
      新类应在自己的头文件中自包含 DECLARE_LOG_CATEGORY_EXTERN 等依赖声明，
      不依赖模块主头文件的间接包含路径传递。
    symptom: >
      GameSaveManager.cpp（位于 Source/Test/Private/ 下）无法通过
      #include "Test.h" 找到 DECLARE_LOG_CATEGORY_EXTERN(LogTest, ...)，
      导致编译失败。修复方案是在 GameSaveManager.h 中自包含日志类别声明。
    prevention: >
      在 Private/ 子目录中创建新类文件时：1) 确认模块主头文件是否在默认包含路径中；
      2) 如不确定或文件深度层级较深，在新类自己的头文件中直接声明所需宏；
      3) 对日志类别使用独立的 DECLARE_LOG_CATEGORY_EXTERN，不依赖外部头文件传递；
      4) 若使用模块级日志类别（如 LogTest），确保其在每个使用位置都能找到定义。
  - id: ll-019
    date: "2026-05-14"
    task: "MapRenderer 移除 console.log，改为公开 onClick 回调属性"
    category: coding-standards
    lesson: >
      console.log 是调试阶段的产物，提交前必须移除。明确禁止的 console.log
      不应出现在任何提交的代码中。移除 console.log 的正确替代方案是将调试信息
      通过公开 API 暴露给消费者：MapRenderer.onClick 回调让外部决定如何处理点击事件，
      既保留了调试能力又遵守了编码规范。
    symptom: >
      MapRenderer 的 click 事件处理中使用了 console.log 输出 tile 坐标和类型，
      违反了编码规范中"禁止提交 console.log"的规则。
    prevention: >
      在 Canvas 组件中需要暴露交互信息给外部时：1) 优先使用公开回调属性模式
      （如 onClick: ((row, col, type) => void) | null）；2) 构造函数使用 options
      对象模式接收可选回调，避免参数位置依赖；3) 在 development_notes 中记录
      此类设计决策供后续维护参考；4) 代码审查时重点检查 console.log 残留。
  - id: ll-020
    date: "2026-05-14"
    task: "回合制战斗系统"
    category: logic
    lesson: >
      CombatSystem.executeCombat 调用 Unit.takeDamage(atkDamage + defender.def)
      采用 reverse-calculation 模式：预先计算伤害值后，将 defender.def 加回 rawDamage 参数，
      利用 takeDamage 内部 Math.max(1, rawDamage - def) 抵消，确保实际伤害 = 预计算值。
      此模式在 CombatSystem 和 Unit 间形成了隐蔽耦合契约——takeDamage 的防御减免公式
      被 CombatSystem 反向利用。若未来修改 takeDamage（如引入百分比减免、护甲穿透等），
      CombatSystem 也需同步调整。
    symptom: >
      CombatSystem 中 defender.takeDamage(atkDamage + defender.def) 的写法对不熟悉
      内部实现的新开发者造成困惑——rawDamage 传入明显高于预期，需要对照 Unit.takeDamage
      的实现才能理解意图。测试中同样使用 takeDamage（如 warrior.takeDamage(95)）但语义不同
      （预伤害用 rawDamage 含义 vs 战斗用 reverse 含义），两处调用语义不一致。
    prevention: >
      在依赖内部公式抵消时：1) 在调用处添加注释解释参数为何放大（+def 的原因）；
      2) 在 Unit.takeDamage 的注释中注明其公式可能被外部反向利用；
      3) 考虑为精确伤害传递添加独立方法（如 Unit.applyDamage(amount)）以消除耦合；
      4) 修改 takeDamage 公式时 grep 所有调用方确认是否有 reverse-calculation 用法。
