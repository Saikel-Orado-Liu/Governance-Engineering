    - {risk: "TurnManager初始状态改为Deploy导致现有测试失败", impact: medium, likelihood: high, mitigation: "Phase 3同步更新测试断言"}
    - {risk: "PlayerCombat阶段UI复杂度超出预估", impact: medium, likelihood: medium, mitigation: "Phase 4先做基础普通攻击, Phase 7再叠加技能UI"}
    - {risk: "Charge技能需要跨模块移动距离跟踪", impact: medium, likelihood: medium, mitigation: "Unit.movedThisTurn + UnitManager.moveUnit更新 + startPlayerTurn重置"}
    - {risk: "main.ts 复杂度持续增长接近难以维护", impact: medium, likelihood: high, mitigation: "当前保持增量演进; 若超过500行建议独立GameController类"}
    - {risk: "技能平衡性迭代成本", impact: low, likelihood: medium, mitigation: "ABILITY_CONFIGS 纯数据改配置即可, 不触碰引擎代码"}
