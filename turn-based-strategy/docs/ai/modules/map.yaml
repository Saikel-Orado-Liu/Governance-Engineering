# Module Card: map
# 8x8 网格地图系统 — 回合制策略游戏棋盘

module: map
path: "src/map/"
type: feature
language: TypeScript 5.6
framework: Canvas 2D

dependencies:
  external: []
  internal:
    - "src/main.ts"                   # 导入 MapGenerator + MapRenderer 并在入口实例化
    - "src/render/IsometricRenderer.ts"  # MapRenderer 使用 worldToScreen/screenToWorld/drawDiamondTile/TILE_W/TILE_H
    - "src/render/AnimationManager.ts"  # MapRenderer 通过 setAnimationManager 桥接
    - "src/unit/Unit.ts"              # MapRenderer 使用 Unit 类型做单位渲染

public_interface:
  - "MapGrid"                 # 8x8 网格数据模型，isPassable/getMoveCost 查询
  - "MapGenerator"            # 随机地图生成（带 BFS 路径保证）
  - "calcOrigin()"            # 动态计算等距投影原点：originX=canvasW/2, originY=canvasH*0.08，适用于全屏响应式 Canvas
  - "MapRenderer"             # 等距 Canvas 渲染器，options 对象构造函数，公开 onClick 回调及 renderUnits/renderHighlights/renderAttackHighlights/renderAbilityRange/renderAbilityTargets/setFlashingUnits/clearFlashingUnits/setSelectedUnit/setAnimationManager/resize 方法

exports:
  - "MapGenerator.generate()"  # 返回 MapGrid 实例
  - "MapRenderer.render()"     # 在 Canvas 上绘制等距菱形网格：Painter's Algorithm (row+col sum 分组)
  - "MapRenderer.renderUnits()" # 按 (row+col) 深度排序绘制单位：几何符号(盾/弓/V/五角星) + 队伍色(蓝/红) + HP 条(cy-18 上方)；选中镂空金边菱形覆盖层
  - "MapRenderer.setSelectedUnit()" # 设置/清除选中单位，renderUnits 末尾绘制金边菱形(rgba(255,215,0,0.15) + #ffd700)
  - "MapRenderer.onClick"      # 公开回调 (row, col, type) => void，内部使用 screenToWorld 做等距点击检测
  - "MapRenderer.setFlashingUnits()"   # 设置受击闪烁单位列表（#ff0000 覆盖队伍色）
  - "MapRenderer.clearFlashingUnits()" # 清除所有闪烁标记
  - "MapRenderer.setAnimationManager()" # 注入 AnimationManager 实例用于动画插值
  - "MapRenderer.renderAbilityRange()" # 渲染技能范围（菱形区域），接收自定义 fillStyle 字符串
  - "MapRenderer.renderAbilityTargets()" # 渲染技能目标（蓝色 rgba(41,128,185,0.5) 菱形高亮）

components:
  - "TileType.ts":             # const enum Plain/Forest/Mountain/Water + TILE_PROPERTIES 属性表
  - "MapGrid.ts":              # 8x8 tiles[][] 数组，行列边界检查
  - "MapGenerator.ts":         # 随机地形（50/25/15/10%）+ forceFullConnectivity 全连通性 BFS
  - "MapRenderer.ts":          # 全屏 Canvas 等距渲染，64x32 菱形瓦片，动态 Origin(canvasW/2, canvasH*0.08)；Painter's Algorithm 瓦片排列；Canvas 几何符号单位；screenToWorld 点击检测；options 对象构造函数；resize() 响应窗口变化
  - "ActionPanel.ts":          # [跨模块引用] 浮动单位信息+技能面板，跟随选中单位位置并做边界检测，独立于 HUD 生命周期

constraints:
  - "Canvas 尺寸全屏填充（position:fixed;inset:0），可通过 MapRenderer.resize() 响应窗口 resize 事件"
  - "Canvas 2D 直接绘制，不使用精灵图或瓦片图集"
  - "地形分布比例硬编码：Plain 50% / Forest 25% / Mountain 15% / Water 10%"
  - "先保证 (0,0)->(7,7) 有通路（bfsHasPath/bfsFindAnyPath），再保证所有可通行格构成单一连通分量（forceFullConnectivity BFS）"
  - "等距渲染：TILE_W=64 / TILE_H=32（2:1 固定比例），投影原点由 calcOrigin() 动态计算：originX=canvasW/2, originY=canvasH*0.08；originY 的 8% 比例与 GRID_SIZE=8 + TILE_W:TILE_H=2:1 的视觉居中耦合"
  - "瓦片渲染使用 Painter's Algorithm：按 row+col sum 从 0→14 递增分组绘制，先远后近保证重叠正确"
  - "单位渲染按 (row+col) 升序排序，front units draw on top——无需 Canvas depth/Z-buffer"
  - "受击闪烁使用 Set<Unit> 临时标记，闪烁期间覆盖队伍色为红色 #ff0000，完全在 renderUnits 分支中处理"
  - "HP 条在单位菱形上方（cy-18），宽度 20px 高度 4px，背景 #555，前景 team0 绿(#2ecc71)/team1 红(#e74c3c)"
  - "选中单位金边菱形在 renderUnits 末尾绘制，作为独立覆盖层在所有单位之上"
  - "技能范围（renderAbilityRange）和技能目标（renderAbilityTargets）复用 renderDiamondCells 内部方法，drawDiamondTile 菱形绘制"
  - "Canvas 纯色背景 #1a1a2e，每次 render() 清空并重绘"
  - "点击检测使用 screenToWorld 等距逆变换 + 行列边界检查（row/col in [0,7]），不再用矩形除法"

known_issues:
  - "setFlashingUnits 使用 Set 引用（非深拷贝），若外部在闪烁期间修改 Unit 引用可能导致意外行为；当前仅 main.ts 在 setTimeout 链中调用，风险可控"
  - "等距投影的深度排序依赖于 (row+col) 单一轴——若未来引入单位高度或飞行单位，(row+col) 排序不足以正确处理空中单位与地面单位的遮挡"

development_notes:
  - "console.log 禁止提交；调试信息通过公开回调（如 onClick）暴露给消费者"
  - "构造函数使用 options 对象模式，便于后续扩展而不破坏调用方签名"
  - "MapRenderer 不再使用 ctx.shadowBlur 发光效果——原型阶段发光是为了让圆形图标在矩形网格中突出，等距菱形网格+几何符号本身已有视觉区分度"
  - "calcOrigin() 为模块导出函数（非 MapRenderer 方法），外部代码无需实例化 MapRenderer 即可预测投影原点位置"
  - "originY = canvasH * 0.08 为经验值：对 8x8 网格和 2:1 菱形瓦片，8% 上边距使棋盘在垂直方向居中；若 GRID_SIZE 或 TILE_W/TILE_H 变更需重新校准"
  - "resize(w, h) 同时更新 canvas.width/height 和 originX/originY，并保留所有内部状态（selectedUnit/flashingUnits/animationManager）——调用方只需在 resize 事件中调用，无需重建 MapRenderer"
  - "originX/originY 为公开实例属性（非 private），main.ts 中 tooltip 的 screenToWorld 坐标转换直接读取 renderer.originX/renderer.originY"
  - "受击闪烁机制与原型相同：setFlashingUnits 接收 Unit[] 转为 Set<Unit> 引用存储；renderUnits 中提前分支判断 flashingUnits.has(unit) 决定颜色"
  - "HP 条从原型 cy+18（单位下方）改为 cy-18（单位上方）——等距菱形图标占据菱形区域，HP 条在上方避免视觉重叠"
  - "renderUnits 不再使用圆形+字母（原型：16px arc + ctx.fillText），改用 Canvas 几何路径（drawShield/drawBow/drawChevron/drawStarShape）"
  - "renderUnits 按 (row+col) 升序排序——深度值大的单位后绘制，自然覆盖深度小的单位（更近的覆盖更远的）"
  - "四种兵种几何符号硬编码路径：Warrior 盾形(半圆8px+梯形)、Archer 弓形(弧±0.4π+弦)、Knight V形(两条直线r=9)、Mage 五角星(内外半径9/4)"
  - "几何符号使用 ctx.fill + ctx.stroke(lineWidth=2)，内部填充队伍色 + 深色边框——与原型发光效果视觉层级不同但可读性更好"
  - "选中单位使用 drawDiamondTile 在 renderUnits 末尾二次绘制——半透明金色填充 (rgba(255,215,0,0.15)) + 金色边框 (#ffd700)——保证在所有单位之上"
  - "renderDiamondCells 内部方法封装了 worldToScreen + drawDiamondTile 循环，被 renderHighlights/renderAttackHighlights/renderAbilityRange/renderAbilityTargets 调用"
  - "renderAbilityRange 和 renderAbilityTargets 为独立方法，原因与原型一致：生命周期独立于移动/攻击高亮"
  - "renderAbilityRange 接受 fillStyle 参数，renderAbilityTargets 固定 rgba(41,128,185,0.5)"

lessons_learned:
  - "移动力成本与通行性分离设计（isPassable 为 boolean gate，getMoveCost 为数值计算）"
  - "TileType 使用 const enum 避免运行时查找，TILE_PROPERTIES 作为 Record 映射成本"
  - "BFS 路径保证是独立于 MapGenerator 的可测试功能点"
  - "地图渲染器无状态设计：每次 render() 从 MapGrid 快照绘制，不与游戏状态耦合"
  - "移除 console.log 改为公开 onClick 回调，保持编码规范同时提供消费者自定义处理能力"
  - "options 对象构造函数模式（new MapRenderer({ canvas, onClick? })），避免参数位置依赖，便于扩展"
  - "受击闪烁使用 Set<Unit> + renderUnits 分支判断模式：不修改 Unit 实体、不增加渲染管线开销、不产生额外副作用"
  - "全连通性保证：仅保证 (0,0)->(7,7) 单路径不足，所有可通行格必须互相可达（forceFullConnectivity 两阶段 BFS）"
  - "等距菱形网格使用 Painter's Algorithm（按 row+col 升序绘制）保证正确重叠顺序——不同于矩形网格的逐行列遍历"
  - "几何符号路径硬编码替代字母图标：四种兵种各一独特形状，无需外部资源加载，零依赖"

last_updated: "2026-05-15"  # Updated for full-screen responsive layout: added calcOrigin(), resize(), dynamic origin constraints
