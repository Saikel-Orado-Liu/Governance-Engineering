# Lessons Learned
# Generated by Summarize Agent on 2026-05-08 - "创建 FGameSaveManager" task

entries:
  - id: ll-018
    date: "2026-05-08"
    task: "创建 FGameSaveManager"
    category: build
    lesson: >
      在模块 Private/ 子目录中创建新类文件时，模块主头文件（如 Test.h）的包含路径
      可能不可达（取决于模块的 IncludePaths 配置），导致 #include "Test.h" 失败。
      新类应在自己的头文件中自包含 DECLARE_LOG_CATEGORY_EXTERN 等依赖声明，
      不依赖模块主头文件的间接包含路径传递。
    symptom: >
      GameSaveManager.cpp（位于 Source/Test/Private/ 下）无法通过
      #include "Test.h" 找到 DECLARE_LOG_CATEGORY_EXTERN(LogTest, ...)，
      导致编译失败。修复方案是在 GameSaveManager.h 中自包含日志类别声明。
    prevention: >
      在 Private/ 子目录中创建新类文件时：1) 确认模块主头文件是否在默认包含路径中；
      2) 如不确定或文件深度层级较深，在新类自己的头文件中直接声明所需宏；
      3) 对日志类别使用独立的 DECLARE_LOG_CATEGORY_EXTERN，不依赖外部头文件传递；
      4) 若使用模块级日志类别（如 LogTest），确保其在每个使用位置都能找到定义。
