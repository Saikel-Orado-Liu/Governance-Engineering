entries:
  - id: ll-019
    date: "2026-05-14"
    task: "实现 AST + 渲染器 + 模板引擎 + CLI + 开发服务器"
    category: logic
    lesson: >
      CLI 工具接受 --template/--css 文件路径参数时容易忽略路径遍历防护。
      如果不对用户提供的路径做白名单校验（resolve + startsWith 项目目录），
      攻击者可通过 ../../../etc/passwd 读取任意文件。
    symptom: >
      Inspector 标记为 MAJOR 安全漏洞。修复前，--template 参数可指向项目目录外的
      任意文件，导致敏感文件内容被包含到生成的页面中。
    prevention: >
      所有用户提供的文件路径参数：1) 使用 path.resolve() 解析为绝对路径；
      2) 校验是否以项目目录为前缀（startsWith）；3) 拒绝包含 .. 段落的路径。
      对模板和 CSS 文件路径实施白名单校验。

  - id: ll-020
    date: "2026-05-14"
    task: "CommonMark 合规性验证"
    category: logic
    lesson: >
      ATX heading 的 # 标记后必须有空格/tab/行尾（CommonMark §4.2）。
      原始代码使用 `rawLine.startsWith('#')` 过于宽松，
      将 `#Not a heading` 错误解析为 heading level 1。
    symptom: >
      `#Not a heading` 输出 `<h1>Not a heading</h1>`，
      但 CommonMark 规范要求输出 `<p>#Not a heading</p>`。
    prevention: >
      ATX heading 检测必须使用 `/^#{1,6}(?:[ \t]|$)/` 正则，
      确保 # 后有分隔符。同步更新 parser.test.ts 中对应断言。

  - id: ll-021
    date: "2026-05-14"
    task: "CommonMark 合规性验证"
    category: logic
    lesson: >
      CommonMark §4.5 要求 fenced code block 关闭 fence 的反引号数必须
      大于等于开始 fence 的反引号数。原始代码仅检查
      `lines[lineIdx].startsWith('```')`，未比较 fence 长度。
    symptom: >
      开口 fence 为 ````（4 反引号）时，```（3 反引号）行被错误
      识别为闭合 fence，导致代码内容截断。
    prevention: >
      提取 fence 反引号数（`/^(\`+)/`），关闭 fence 的反引号数 >= 开始 fence。
      lexer（tokenize）和 AST builder（buildAST）两处保持一致的比较逻辑。
