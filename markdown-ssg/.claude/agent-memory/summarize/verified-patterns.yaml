patterns:
  - pattern_id: P-001
    date: "2026-05-12"
    name: "两阶段词法分析"
    description: >
      Markdown 解析分为两个独立阶段：Phase 1 按行扫描识别块级结构，
      Phase 2 对特定块级 token 的内容做行内正则匹配。
      两个阶段的结果合并为按位置排序的扁平 Token 数组。
    context: >
      需要解析具有块级和内联两种语法层次的标记语言。
      适合文件规模较小（<1MB）、不需要处理深层嵌套语法的场景。
    verified_count: 1
    last_used: "2026-05-12"

  - pattern_id: P-002
    date: "2026-05-14"
    name: "AST 管道架构"
    description: >
      在词法分析器和渲染器之间插入 AST 中间层，形成
      Token[] → buildAST → DocumentNode → renderToHTML → HTML
      的管道架构。Token 和 HTML 不直接耦合，通过 AST 作为接口边界隔离。
      每层职责单一：Lexer 只管产生扁平 Token，AST builder 处理层级组合，
      Renderer 只需 switch 匹配节点类型递归输出 HTML。
    context: >
      源语言（Markdown）有层级嵌套语法（列表内段落、段落内内联样式），
      且渲染逻辑需要在多个输出格式之间切换或扩展的场景。
      适合中小规模标记语言处理工具。
    verified_count: 1
    last_used: "2026-05-14"

  - pattern_id: P-003
    date: "2026-05-14"
    name: "布局回退链（显式完全压制隐式）"
    description: >
      模板/布局选择使用降序优先级链：
      显式全局参数 → per-file 元数据 → 内置默认值。
      关键语义是"完全压制"而非"叠加覆盖"：当高级选项被设置时，
      低级选项不再被读取或评估。
      实现方式：条件判断中使用
      `if (!highPriorityOption && lowPriorityOption)` 模式。
    context: >
      需要多级配置覆盖的场景，其中某些配置来源（如 CLI 参数）
      应完全取代而非覆盖其他来源（如文件内元数据）。
      适用于 CLI 工具、配置系统、主题系统等。
    verified_count: 1
    last_used: "2026-05-14"

  - pattern_id: P-004
    date: "2026-05-14"
    name: "CommonMark 合规性测试运行器"
    description: >
      以 JSON 数组格式存储 CommonMark 规范测试用例
      （{description, section, markdown, html} 四字段），
      通过 vitest 动态读取并按 section 分组生成 describe/it 块。
      afterAll 中聚合输出 stdout 合规报告（per-section 通过率 + 总计）。
      已知缺口记录在 known_issues 而非标注 expected failure。
    context: >
      需要对标记语言解析器进行系统化规范验证的场景。
      适合用例结构简单（markdown→html 映射）、
      需要非开发者可维护性的项目。
    verified_count: 1
    last_used: "2026-05-14"
