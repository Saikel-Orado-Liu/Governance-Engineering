# src — CLI 入口和核心逻辑

name: src
path: src/
type: application
language: TypeScript 5.6
description: >
  Markdown 静态站点生成器的 CLI 入口和核心逻辑。
  通过 src/index.ts 暴露 CLI 接口。

public_interface:
  - "CLI 命令 (index.ts): markdown-ssg <input.md> [--output <path>] [--watch] — 单文件模式（bin 注册入口）"
  - "CLI 命令 (cli.ts): node dist/cli.js build <src> <out> [--template <path>] [--css <path>] — 目录模式（无 bin 注册）"
  - "CLI 命令 (cli.ts): node dist/cli.js serve <src> <out> [--port <port>] — 开发服务器模式"
  - "导出函数: buildAST, parse, renderToHTML, escapeHtml, renderTemplate, DEFAULT_TEMPLATE"
  - "导出函数: convertFile(inputPath, outputPath?): string — 单文件 Markdown→HTML 转换"
  - "导出函数: main(): void — 单文件 CLI 参数解析入口"
  - "导出类型: 全部 15 种 ASTNode discriminated union"

dependencies:
  lexer: "src/lexer.ts — 两阶段 Markdown 词法分析器"
  ast: "src/ast.ts — AST 节点类型和 buildAST 构建器"
  renderer: "src/renderer.ts — HTML 递归渲染器 + XSS 转义"
  template: "src/template.ts — Mustache {{var}} 模板引擎"
  cli: "src/cli.ts — CLI 命令实现 (build/serve)"
  parser: "src/parser.ts — 解析器薄代理层，导出 parse(tokens): DocumentNode"

dependents: []

constraints:
  - "ES2022 target, ESNext module"
  - "strict 模式开启"
  - "AST 作为 lexer 与 renderer 之间的接口边界"
  - "index.ts 使用 DEFAULT_TEMPLATE，不支持自定义模板（单文件模式简化设计）"
  - "bin 配置指向 index.js（单文件模式）；目录模式需通过 node dist/cli.js 直接调用"
  - "双 CLI 入口并存：index.ts(单文件) 与 cli.ts(目录模式)，各有独立参数解析和 main()"
  - "cli.ts 接受 --template/--css 路径参数，需白名单校验防路径遍历"

known_issues: []

last_updated: "2026-05-14"
