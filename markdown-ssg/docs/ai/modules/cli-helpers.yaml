# cli-helpers — CLI 共享工具函数

name: cli-helpers
path: src/cli-helpers.ts
type: module
language: TypeScript 5.6
description: >
  在 src/index.ts 和 src/cli.ts 两个 CLI 入口之间共享的工具函数。
  当前仅包含 readFileOrExit——从磁盘读取文件，失败时打印错误并退出进程。
  目的：消除 index.ts 和 cli.ts 之间的重复代码。

public_interface:
  - "export function readFileOrExit(filePath: string, label: string): string"

dependencies: {}

dependents:
  - "src/index.ts — 在 convertFile/main 中调用读取模板和 CSS"
  - "src/cli.ts — 在 build serve 命令中调用读取模板和 CSS"

constraints:
  - "进程级退出（process.exit(1)）——仅适用于 CLI 入口，不适合编程式调用"
  - "使用 readFileSync（同步）——仅在 CLI 启动时调用，不影响异步管道"

known_issues: []

last_updated: "2026-05-14"
