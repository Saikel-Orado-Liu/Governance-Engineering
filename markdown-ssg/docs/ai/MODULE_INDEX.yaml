# AI 知识库模块索引
# 由 init-agent 自动生成，summarize-agent 在每次任务后更新。

modules:
  - name: src
    path: src/
    type: application
    description: "CLI 入口和核心逻辑 — Markdown 静态站点生成器"
    card: docs/ai/modules/src.yaml
  - name: ast
    path: src/ast.ts
    type: module
    description: "AST 节点类型定义和 buildAST 构建器"
    card: docs/ai/modules/ast.yaml
  - name: renderer
    path: src/renderer.ts
    type: module
    description: "HTML 递归渲染器 + XSS 转义"
    card: docs/ai/modules/renderer.yaml
  - name: template
    path: src/template.ts
    type: module
    description: "Mustache {{var}} 模板引擎"
    card: docs/ai/modules/template.yaml
  - name: cli
    path: src/cli.ts
    type: module
    description: "CLI 命令实现 (build/serve)"
    card: docs/ai/modules/cli.yaml
  - name: server
    path: src/server.ts
    type: module
    description: "HTTP 开发服务器 + SSE 热刷新"
    card: docs/ai/modules/server.yaml
  - name: parser
    path: src/parser.ts
    type: module
    description: "解析器薄代理层 — 包装 buildAST 为 parse() 公开 API"
    card: null

standards:
  - file: docs/ai/standards/ts-checklist.yaml
    description: "TypeScript 编码规范检查清单（L1/L2/L3 分层）"
