patterns:
  - pattern_id: P-001
    date: "2026-05-12"
    name: "FastAPI + sqlite-utils CRUD 集成模式"
    description: >
      使用 FastAPI lifespan (asynccontextmanager) 管理 SQLite 连接生命周期，
      sqlite-utils Table API (create/insert/update/get/delete/rows_where) 实现参数化 CRUD，
      配合 check_same_thread=False + WAL 解决并发线程安全问题。
    context: >
      适用于 FastAPI Python 后端需要轻量 SQLite 持久化且使用 sqlite-utils 库的场景。
      生产部署需单进程（Uvicorn workers=1），多进程需每个进程独立连接。
    verified_count: 1
    last_used: "2026-05-12"

  - pattern_id: P-002
    date: "2026-05-12"
    name: ":memory: SQLite + dependency_overrides 测试隔离模式"
    description: >
      测试使用 :memory: 内存 SQLite 数据库，通过 FastAPI dependency_overrides 机制
      将 get_db 替换为返回内存连接的测试用 get_test_db，实现测试隔离。
      每个测试函数创建独立内存 DB + 独立表结构，避免测试间数据污染。
    context: >
      适用于 FastAPI + SQLite 项目的单元测试。内存 DB 速度快、无需清理文件，
      dependency_overrides 是 FastAPI 官方推荐的依赖注入替换方式。
    verified_count: 1
    last_used: "2026-05-12"

  - pattern_id: P-003
    date: "2026-05-13"
    name: "原生 HTML5 DnD + 单组件扁平化看板模式"
    description: >
      使用原生 HTML5 Drag and Drop API（无外部拖拽库）实现三列看板拖拽。
      单 Board.tsx 组件内联三态渲染（加载骨架屏/错误重试/正常三列），
      useState + useCallback + useEffect 自包含管理状态和乐观更新。
      handleDrop 中用 JSON.parse(JSON.stringify()) 深拷贝 columns 做拖拽前快照，
      API 失败时 setColumns(snapshot) 瞬时内存恢复（替代 catch→load() 全量网络重载）。
      CSS 优先级色条使用 Record<TaskPriority, string> 查找表。
    context: >
      适用于 React 18 SPA 中拖拽场景的乐观更新错误恢复。
      深拷贝快照仅适用于纯数据对象（无函数/循环引用/Date/Map/Set），
      回滚性能 O(1) 内存赋值，适合中小规模看板。
    verified_count: 2
    last_used: "2026-05-13"

  - pattern_id: P-004
    date: "2026-05-13"
    name: "自包含组件 Modal 模式（父组件仅控制开闭）"
    description: >
      CreateTaskModal 采用完全自包含设计：内部管理表单状态、优先级选择、验证、
      API 调用和 loading/error 态。支持 mode="create"|"edit"：create 调用
      createTask、edit 通过 task prop 预填表单后调用 updateTask。父组件（Board）
      仅通过 boolean + onClose callback 控制打开/关闭，不介入任何表单逻辑。
      此模式防止 Board.tsx 膨胀，保持组件责任边界清晰。配套约定：Esc 键关闭 +
      遮罩层点击关闭 + stopPropagation 防事件冲突 + useEffect keydown 清理。
      此类模式同样适用于 ConfirmDialog（通用确认弹窗）和 Toast（轻量通知组件），
      父组件仅控制 open (boolean) + onConfirm/onCancel 或 onClose callback。
    context: >
      适用于 React 组件树中需要添加 Modal/弹窗/侧边栏等附加 UI 层的场景。
      当父组件（如 Board）已承担核心业务逻辑（看板拖拽与乐观更新），新功能应
      自包含为独立组件，父组件只控制 show/hide。操作完成后通过 onClose 通知
      父组件 load() 全量刷新，不依赖单组件内部 cache 更新。
    verified_count: 3
    last_used: "2026-05-13"
