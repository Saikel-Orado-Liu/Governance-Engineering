entries:
  - id: LL-019
    date: "2026-05-12"
    task: "实现 Task Board SQLite 持久化层和 CRUD API"
    category: lifecycle
    title: "SQLite 跨线程限制在 FastAPI 异步上下文中的处理"
    description: >
      FastAPI 使用线程池处理请求，而 Python sqlite3.Connection 默认禁止跨线程使用
      （check_same_thread=True）。未设置 check_same_thread=False 时，多个并发请求
      会导致 sqlite3.ProgrammingError。同时，默认回滚日志模式在并发场景下容易触发
      "database is locked"。
    root_cause: >
      sqlite3 的线程安全检查机制（每个连接关联创建线程 ID）与 FastAPI 的线程池模型冲突。
    prevention: >
      创建 sqlite3.Connection 时设置 check_same_thread=False，并启用 WAL 模式
      （通过 sqlite-utils 的 enable_wal()）。连接生命周期由 FastAPI lifespan 管理，
      确保单例连接在应用启动时创建、关闭时清理。生产部署限制 workers=1。
    resolved: true

  - id: LL-020
    date: "2026-05-12"
    task: "Task Board 前端新增 Kanban 看板视图"
    category: logic
    title: "乐观更新中使用单一快照 Ref 在快速连续拖拽时产生竞态"
    description: >
      Kanban 拖拽场景中实现乐观更新回滚时，使用单一 snapshotRef（存储整个任务数组快照）
      会导致快速连续拖拽下的竞态问题。当用户快速拖拽任务 A→B→C 时，回滚可能恢复到
      错误的中间状态而非正确的拖拽前状态。原因：单一 ref 在每次拖拽开始时被覆盖，
      早前操作的失败回调会拿到最新（但不匹配的）快照。
    root_cause: >
      React ref 是可变的引用容器。在快速连续异步操作中，多个 onDragEnd 回调可能交叉执行，
      单一 ref 只能保留最后一次赋值，而早前操作的失败回调执行时拿到的已是后续操作的快照。
    prevention: >
      使用 per-task Map（useRef<Map<string, Task>>）以 taskId 为键存储每个任务的独立快照。
      回滚时只操作失败任务对应的条目，既避免竞态也减少影响范围。核心原则：并发乐观操作中，
      回滚粒度应与操作粒度一致——操作的是 task，回滚的也应是 task，而非整个数组快照。
    resolved: true

  - id: LL-021
    date: "2026-05-13"
    category: logic
    title: "跨列拖拽时 sort_order 未重新计算导致新列内排序混乱"
    description: >
      看板实现同列拖拽排序引入 per-column 独立 0..N-1 sort_order 编号后，
      跨列拖拽（drag across columns）未显式设置目标 sort_order，导致
      卡片的 sort_order 保留了源列的值。该值在目标列 0..N-1 上下文中
      可能越界（大于目标列最大 index）或与其他卡片冲突。Inspector 发现
      此问题，修复为将跨列拖拽的 targetIndex 设为 targetCol.tasks.length
      （追加到目标列末尾）。
    root_cause: >
      sort_order 是列内独立编号，无全局约束。跨列操作时开发者自然关注
      status 变更（列切换）而忽略 sort_order 在新列上下文中无效。
    prevention: >
      所有跨列拖拽 handler 必须显式设置目标 sort_order，推荐追加到末尾
      （targetIndex = targetCol.tasks.length）。或者在后端 /reorder 端点
      中做防御性检查：如果请求的 sort_order 超出目标列范围则自动修正。
      更根本的方案：cross-column drop 和 same-column drop 分流处理，
      分别走不同的逻辑路径。
    resolved: true
