# Lessons Learned
# 由 Summarize Agent 自动维护。

entries:
  - id: LL-001
    date: "2026-05-13"
    category: lifecycle
    title: "任务创建入口必须最先实现"
    description: "Board 初始无创建任务入口，看板始终为空无法验证拖拽。CRUD 的 Create 入口必须最先实现。"
    root_cause: "开发顺序规划错误，Create 是最基础交互入口。"
    prevention: "CRUD 按 C→R→U→D 顺序实现。"
    resolved: true

  - id: LL-002
    date: "2026-05-13"
    category: logic
    title: "过滤和搜索应在 CRUD 完成后立即实现"
    description: "过滤作为后期添加功能，数据量一大看板就不可用。"
    root_cause: "过滤搜索是数据可用最低标准，不应延迟。"
    prevention: "CRUD 完成后应立即实现过滤和搜索。"
    resolved: true

  - id: LL-003
    date: "2026-05-13"
    category: logic
    title: "乐观更新应配内存回滚避免网络重载"
    description: "拖拽乐观更新最初用全量 load() 回滚（~200ms），改为 useRef 深拷贝快照后恢复零延迟。"
    root_cause: "回滚策略选择了网络重载而非内存恢复。"
    prevention: "乐观更新配内存快照回滚，避免 catch→load() 全量重载。"
    resolved: true

  - id: LL-004
    date: "2026-05-13"
    category: logic
    title: "拖拽库选择优先原生实现"
    description: "@dnd-kit 版本兼容问题导致白屏，改为原生 HTML5 DnD API。"
    root_cause: "外部库版本变更不可控，引入 ~30KB 额外体积。"
    prevention: "简单拖拽优先原生 HTML5 DnD，仅触屏/复杂动画场景引入拖拽库。"
    resolved: true

  - id: LL-005
    date: "2026-05-13"
    category: naming
    title: "项目初期应建立 CSS 设计令牌系统"
    description: "全局样式重构发现大量硬编码颜色值分散在 7+ CSS 文件中。"
    root_cause: "未建立集中式 CSS 变量体系。"
    prevention: "初期在 global.css 集中定义 50+ CSS 自定义属性，组件通过 var() 引用。[data-theme] 驱动主题切换。"
    resolved: true

  - id: LL-019
    date: "2026-05-12"
    category: lifecycle
    title: "SQLite 跨线程限制与 FastAPI 兼容"
    description: "sqlite3 默认 check_same_thread=True 与 FastAPI 线程池冲突，默认日志模式并发易 locked。"
    root_cause: "sqlite3 线程安全检查与 FastAPI 线程池模型冲突。"
    prevention: "check_same_thread=False + WAL 模式 + lifespan 管理 + workers=1。"
    resolved: true

  - id: LL-021
    date: "2026-05-13"
    category: logic
    title: "跨列拖拽 sort_order 未重新计算"
    description: "跨列拖拽未设目标 sort_order，卡片保留源列值，新列中可能越界冲突。"
    root_cause: "sort_order 是列内编号，开发者忽略跨列后重新编号。"
    prevention: "跨列拖拽显式设目标 sort_order（追加末尾），后端做防御性检查。"
    resolved: true

  - id: LL-022
    date: "2026-05-13"
    category: logic
    title: "单 Ref 快照同步捕获避免乐观回滚竞态"
    description: "单一 dragState ref 存储深拷贝快照，同步路径捕获并消费后清空。浏览器 DnD 天然单操作保证安全。"
    root_cause: "异步回调中读取快照可能被后续操作覆盖。"
    prevention: "快照捕获和消费在同一同步事件循环中完成，操作后清空 ref。"
    resolved: true
