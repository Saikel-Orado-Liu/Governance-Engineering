# scicomp — AI 知识库模块索引

modules:
  linalg:
    description: 线性代数 — 矩阵乘法、LU 分解、线性方程组求解、行列式、特征值计算
    path: src/scicomp/linalg/
    references: numpy.linalg, scipy.linalg

  stats:
    description: 统计分布 — 正态、t、卡方、F 分布 PDF/CDF/PPF
    path: src/scicomp/stats/
    references: scipy.stats

  interp:
    description: 插值与拟合 — 线性插值、三次样条、最小二乘拟合
    path: src/scicomp/interp/
    references: scipy.interpolate

  integrate:
    description: 数值积分 — 梯形法则、Simpson、Gauss 求积
    path: src/scicomp/integrate/
    references: scipy.integrate
