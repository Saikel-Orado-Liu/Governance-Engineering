# linalg — 线性代数模块

module: linalg
path: src/scicomp/linalg/
status: active

dependencies:
  - numpy

dependents: []

public_interface:
  - name: matrix_multiply
    signature: "matrix_multiply(A: ArrayLike, B: ArrayLike) -> np.ndarray"
    description: 矩阵乘法。验证二维输入 + 维度兼容性检查，使用 numpy 原生 @ 运算
  - name: lu_decomposition
    signature: "lu_decomposition(A: ArrayLike) -> tuple[np.ndarray, np.ndarray, np.ndarray]"
    description: LU 分解（部分主元法）。返回 (L, U, P) 满足 PA = LU。动态 pivot 容差 n * eps * ||A||_1
  - name: solve_linear_system
    signature: "solve_linear_system(A: ArrayLike, b: ArrayLike) -> np.ndarray"
    description: 基于 LU 分解解线性方程组 Ax = b，支持 1D 和 2D 右端项。奇异矩阵 raise ValueError
  - name: determinant
    signature: "determinant(A: ArrayLike) -> float"
    description: 通过 LU 分解计算方阵行列式。奇异矩阵返回 0.0
  - name: eigenvalues_2x2
    signature: "eigenvalues_2x2(A: ArrayLike) -> np.ndarray"
    description: 2x2 矩阵特征值二次公式解析解，支持实数与复数特征值。仅限 2x2
  - name: vector_norm
    signature: "vector_norm(x: np.ndarray, ord: str = 'l2') -> float"
    description: 向量范数计算。支持 l1、l2、linf 范数，委托 numpy.linalg.norm 实现。输入必须是 1D 数组
  - name: eig
    signature: "eig(a: ArrayLike) -> tuple[np.ndarray, np.ndarray]"
    description: 方阵特征值与特征向量计算。委托 numpy.linalg.eig，捕获 LinAlgError 重抛为 ValueError
  - name: matrix_inverse
    signature: "matrix_inverse(a: ArrayLike) -> np.ndarray"
    description: 方阵求逆。委托 numpy.linalg.inv，奇异矩阵 raise ValueError('Matrix is singular')
  - name: qr_decomposition
    signature: "qr_decomposition(a: ArrayLike) -> tuple[np.ndarray, np.ndarray]"
    description: QR 分解，返回 (Q, R) 满足 A = Q @ R。委托 numpy.linalg.qr(mode='reduced')
  - name: cholesky_decomposition
    signature: "cholesky_decomposition(a: ArrayLike) -> np.ndarray"
    description: Cholesky 分解，返回 L 满足 A = L @ L^T。矩阵必须对称正定，非正定 raise ValueError
  - name: matrix_norm
    signature: "matrix_norm(a: ArrayLike, ord: str = 'fro') -> float"
    description: 矩阵范数计算。支持 fro、l1、l2（谱范数）、linf。与 vector_norm 共用相同 ord 字符串接口但语义不同（l2=谱范数）
  - name: matrix_transpose
    signature: "matrix_transpose(a: ArrayLike) -> np.ndarray"
    description: 矩阵转置。委托 numpy.transpose，验证 2D 输入
  - name: trace
    signature: "trace(a: ArrayLike) -> float"
    description: 方阵迹（对角元素和）。委托 numpy.trace，验证方阵输入

precision:
  max_relative_error: 1e-12
  reference: numpy.linalg

functions:
  - name: matrix_multiply
    category: basic
    loc: 16
    design: "委托 numpy @ 实现，只做校验封装"
    validated: true
  - name: lu_decomposition
    category: decomposition
    loc: 50
    design: "部分主元法，动态容差 n * eps * ||A||_1，原地修改 U 矩阵"
    validated: true
  - name: solve_linear_system
    category: solver
    loc: 37
    design: "复用 lu_decomposition + 前代/回代，支持 1D/2D b"
    validated: true
  - name: determinant
    category: property
    loc: 19
    design: "复用 lu_decomposition，奇异矩阵返回 0.0 而非 raise"
    validated: true
  - name: eigenvalues_2x2
    category: property
    loc: 24
    design: "二次公式闭式解，判别式分支处理实数/复数"
    validated: true
  - name: vector_norm
    category: utility
    loc: 26
    design: "委托 numpy.linalg.norm，只做校验封装 + ord 字符串映射"
    validated: true
  - name: eig
    category: property
    loc: 22
    design: "委托 numpy.linalg.eig，_validate_square 校验 + LinAlgError 异常转换"
    validated: true
  - name: matrix_inverse
    category: basic
    loc: 20
    design: "委托 numpy.linalg.inv，_validate_square 校验 + LinAlgError→ValueError('Matrix is singular')"
    validated: true
  - name: qr_decomposition
    category: decomposition
    loc: 18
    design: "委托 numpy.linalg.qr(mode='reduced')，_validate_matrix 校验 2D"
    validated: true
  - name: cholesky_decomposition
    category: decomposition
    loc: 22
    design: "委托 numpy.linalg.cholesky，_validate_square 校验 + LinAlgError→ValueError"
    validated: true
  - name: matrix_norm
    category: utility
    loc: 25
    design: "委托 numpy.linalg.norm，_validate_matrix 校验 + _MATRIX_NORM_ORD_MAP 字符串映射，独立于 _NORM_ORD_MAP"
    validated: true
  - name: matrix_transpose
    category: utility
    loc: 14
    design: "委托 numpy.transpose，_validate_matrix 校验 2D"
    validated: true
  - name: trace
    category: property
    loc: 16
    design: "委托 numpy.trace，_validate_square 校验方阵"
    validated: true

design_decisions:
  - topic: 单文件 vs 多文件
    choice: 单文件 core.py
    rationale: "模块功能紧密耦合（solve_linear_system 依赖 lu_decomposition，determinant 也依赖它），过早多文件拆分增加维护开销。等模块膨胀到 >800 LOC 再拆分"
  - topic: 奇异矩阵处理
    choice: lu_decomposition raise ValueError，determinant 返回 0.0
    rationale: "分解阶段必须报错（无法继续），行列式计算中奇异是可接受输入值"
  - topic: 特征值方法
    choice: 二次公式解析解
    rationale: "2x2 矩阵有稳定的闭式解，比迭代法更简单高效。n>2 用 numpy.linalg.eigvals"

known_issues:
  - issue: "lu_decomposition 部分主元法对 nearly-singular 矩阵可能不够稳定"
    mitigation: "使用动态容差 n * eps * ||A||_1，对极端病态矩阵建议用户直接用 numpy.linalg"
    severity: low
  - issue: "eigenvalues_2x2 仅支持 2x2，对更大矩阵没有 fallback"
    mitigation: "设计上明确限定 2x2，n>2 的应用应另外实现或使用 numpy.linalg.eigvals。通用替代: eig"
    severity: low

constraints:
  - "矩阵运算函数（matrix_multiply, lu_decomposition, solve_linear_system, determinant, eigenvalues_2x2）输入必须是 2D 矩阵"
  - "vector_norm 输入必须是 1D 数组"
  - "浮点精度上限 float64，不保证 float32 输入的精度"

